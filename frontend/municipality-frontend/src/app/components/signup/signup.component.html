<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-100 to-purple-200">
  <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm">
    <h2 class="text-3xl font-bold text-center mb-6 text-gray-800">Create Account</h2>

    <!-- Profile photo upload -->
    <div class="flex justify-center mb-6">
      <label class="relative cursor-pointer">
        <div class="w-32 h-32 rounded-full border-4 border-blue-400 overflow-hidden flex items-center justify-center bg-gray-100 hover:bg-gray-200 transition">
          <img
            *ngIf="photoPreview"
            [src]="photoPreview"
            alt="Profile"
            class="w-full h-full object-cover"
          />
          <span *ngIf="!photoPreview" class="text-gray-400 text-xl">+</span>
        </div>
        <input type="file" (change)="uploadPhoto($event)" class="hidden" />
      </label>
    </div>

    <div class="space-y-4">
      <input
        type="text"
        [(ngModel)]="name"
        placeholder="Name"
        class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <input
        type="email"
        [(ngModel)]="email"
        placeholder="Email"
        class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Password"
        class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <select
        [(ngModel)]="role"
        class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
      >
        <option value="customer">Customer</option>
        <option value="worker">Worker</option>
        <option value="admin">Admin</option>
      </select>

      <button
        (click)="onSignup()"
        [disabled]="isLoading$ | async"
        class="w-full bg-blue-500 hover:bg-blue-600 disabled:bg-gray-400 text-white py-3 rounded-xl font-semibold transition-colors"
      >
        <span *ngIf="!(isLoading$ | async)">Sign Up</span>
        <span *ngIf="isLoading$ | async">Creating Account...</span>
      </button>
    </div>

    <p class="mt-6 text-center text-gray-500 text-sm">
      Already have an account?
      <a routerLink="/login" class="text-blue-500 hover:underline">Login</a>
    </p>
  </div>
</div>
